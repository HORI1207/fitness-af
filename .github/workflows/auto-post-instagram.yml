# Instagram 自動投稿 GitHub Actions ワークフロー
# 毎日 19:00 JST（= 10:00 UTC）に記事カード画像をローテーション投稿する

name: Instagram 自動投稿

on:
  schedule:
    - cron: '0 10 * * *'   # 毎日 19:00 JST
  workflow_dispatch:         # GitHub上から手動実行も可能

jobs:
  post:
    runs-on: ubuntu-latest

    # 投稿済みインデックスをコミットするために書き込み権限が必要
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージをインストール
        run: npm install @napi-rs/canvas

      - name: 記事カード画像を生成
        run: node scripts/generate-cards.js

      - name: Instagram に投稿
        run: node scripts/post-to-instagram.js
        env:
          IG_USER_ID:     ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}

      - name: 投稿済みインデックスをコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/last-posted-ig.json
          git diff --staged --quiet || git commit -m "chore: Instagram投稿済みインデックスを更新"
          git push
